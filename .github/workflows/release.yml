name: Release packages

# Builds the distributable packages whenever a GitHub Release is published and
# attaches/publishes them:
#   • .deb  (x86_64 + aarch64) → uploaded as release assets
#   • AUR   (loquivox)         → pushed to aur.archlinux.org
#
# The version comes from the release tag (a leading "v" is stripped, so the tag
# "v1.2.0" yields version 1.2.0). Create the release from a tag like that.
#
# Required repository secrets for the AUR job:
#   AUR_SSH_PRIVATE_KEY  — private half of an SSH key registered on your AUR
#                          account (the package must be created on the AUR once
#                          by hand before the first automated push).
#   AUR_USERNAME         — commit author name for the AUR git history.
#   AUR_EMAIL            — commit author email for the AUR git history.

on:
  release:
    types: [published]
  # Allows a manual re-run against an existing tag/release from the Actions tab.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build, e.g. v1.2.0'
        required: true

permissions:
  contents: write   # upload .deb assets onto the release

jobs:
  # ----------------------------------------------------------------- .deb
  deb:
    name: deb (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tag
        id: meta
        run: |
          tag='${{ github.event.release.tag_name || github.event.inputs.tag }}'
          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}"       >> "$GITHUB_OUTPUT"

      # Runtime apt deps so the --system-site-packages venv can see them, plus
      # the .deb build tooling. (cmake/build-essential land in the fallback only.)
      - name: Install build + runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-venv python3-pip dpkg-dev \
            python3-numpy python3-scipy python3-evdev python3-gi python3-cairo \
            python3-tomlkit python3-openai \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 gir1.2-ayatanaappindicator3-0.1 \
            libspeexdsp1 libportaudio2

      # Prefer the already-published static engine binary; fall back to building
      # it from source if that release/asset doesn't exist for the pinned version.
      - name: Fetch prebuilt whisper-cli (fallback → build from source)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="$(tr -d '[:space:]' < packaging/whisper-cpp.version)"
          if gh release download "whisper-engine-$ver" \
               --repo "$GITHUB_REPOSITORY" \
               --pattern "whisper-cli-${{ matrix.arch }}" \
               --output "$PWD/whisper-cli" 2>/dev/null; then
            chmod +x "$PWD/whisper-cli"
            echo "LOQUIVOX_PREBUILT_WHISPER_CLI=$PWD/whisper-cli" >> "$GITHUB_ENV"
            echo "✓ Reusing prebuilt engine $ver for ${{ matrix.arch }}"
          else
            echo "⚠ No prebuilt engine $ver/${{ matrix.arch }} — building from source"
            sudo apt-get install -y cmake build-essential git
          fi

      - name: Build .deb
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: sudo --preserve-env=VERSION,LOQUIVOX_PREBUILT_WHISPER_CLI packaging/deb/build-deb.sh

      - name: Upload .deb to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: dist/loquivox_*_*.deb

  # ----------------------------------------------------------------- AUR
  # Runs inline inside an Arch container (full control over the SSH handshake)
  # instead of a third-party action, so the connectivity probe below surfaces
  # exactly why a push is (or isn't) accepted. updpkgsums/makepkg refuse to run
  # as root, hence the unprivileged `builder` user.
  aur:
    name: Publish to AUR
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    env:
      PKGNAME: loquivox
    steps:
      - name: Install Arch packaging + SSH tooling
        run: |
          pacman -Syu --noconfirm --needed base-devel git openssh pacman-contrib
          useradd -m builder

      - uses: actions/checkout@v4

      - name: Resolve version + tag
        id: meta
        run: |
          tag='${{ github.event.release.tag_name || github.event.inputs.tag }}'
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build package files, probe AUR, push
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          # --- stage the SSH identity + workdir for the unprivileged builder ---
          install -dm700 /home/builder/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/aur
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org > /home/builder/.ssh/known_hosts 2>/dev/null
          printf 'Host aur.archlinux.org\n  User aur\n  IdentityFile /home/builder/.ssh/aur\n  IdentitiesOnly yes\n' \
            > /home/builder/.ssh/config
          chmod 600 /home/builder/.ssh/aur /home/builder/.ssh/config
          install -dm755 /home/builder/work
          cp packaging/aur/PKGBUILD /home/builder/work/
          chown -R builder:builder /home/builder

          # --- everything that follows runs as builder (env is inherited) ---
          runuser -u builder -- bash -euo pipefail -c '
            cd /home/builder/work

            echo "::group::SSH key fingerprint the runner will offer"
            ssh-keygen -l -f ~/.ssh/aur
            echo "::endgroup::"

            echo "::group::Verbose AUR connectivity probe (diagnostic, non-fatal)"
            ssh -v aur@aur.archlinux.org help || true
            echo "::endgroup::"

            sed -i -E "s/^pkgver=.*/pkgver=$VERSION/; s/^pkgrel=.*/pkgrel=1/" PKGBUILD
            grep -E "^(pkgver|pkgrel)=" PKGBUILD
            updpkgsums
            makepkg --printsrcinfo > .SRCINFO

            git config --global user.name  "$AUR_USERNAME"
            git config --global user.email "$AUR_EMAIL"
            git init -q -b master
            git remote add origin "ssh://aur@aur.archlinux.org/$PKGNAME.git"
            # base our commit on the existing AUR tree when the package already exists
            if git fetch -q origin master 2>/dev/null; then
              git reset --soft FETCH_HEAD
            fi
            git add PKGBUILD .SRCINFO
            git commit -q -m "Update to $TAG" || echo "nothing to commit — pushing current state"
            GIT_SSH_COMMAND="ssh -v" git push origin HEAD:master
          '
