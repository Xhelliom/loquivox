# Loquivox user configuration.
#
# Copy to ~/.config/loquivox/config.toml and edit. Every key is OPTIONAL;
# anything omitted falls back to the built-in defaults in config.py. A missing
# or malformed file is ignored (the app still starts on defaults).

[transcription]
# Which engine transcribes speech:
#   "groq"        — Groq Cloud Whisper, batch (default; needs GROQ_API_KEY)
#   "whispercpp"  — local whisper.cpp, offline, no key (needs the [local] extra:
#                   pip install -e '.[local]')
#   "auto"        — Groq if a key is present, otherwise whispercpp
#   "openai_realtime" / "deepgram" — streaming live (added in the streaming phase)
backend = "groq"
# Offline backend used AUTOMATICALLY when the primary is unavailable (no
# network / no key / API error). Set to "" to disable the fallback.
fallback = "whispercpp"
# Local whisper.cpp model (auto-downloads on first use): tiny, base, small,
# medium, large-v3, large-v3-turbo, plus .en English-only variants.
whispercpp_model = "base"
# Streaming backends give true LIVE transcription (partial text appears in the
# overlay while you speak). Each needs its package + an API key in the
# environment; if unavailable, the fallback above kicks in automatically.
#   backend = "deepgram"         + pip install -e '.[deepgram]'  + DEEPGRAM_API_KEY
#   backend = "openai_realtime"  + pip install -e '.[openai]'    + OPENAI_API_KEY
deepgram_model = "nova-3"
openai_model   = "gpt-4o-transcribe"

# Whisper model served by Groq (this app uses the Groq Cloud API, not a local
# model — so values like "base.en" do NOT work here).
#   whisper-large-v3        — most accurate
#   whisper-large-v3-turbo  — faster / lower latency
model = "whisper-large-v3"
# Force a transcription language as an ISO-639-1 code, e.g. "en", "fr", "de".
# Omit or leave "" to let Whisper autodetect.
language = ""
# Microphone to record from, by device NAME (see the "Microphone" dropdown in
# Settings, or run `python -c "import sounddevice; print(sounddevice.query_devices())"`).
# Leave "" to use the system default input. An unknown/disconnected name falls
# back to the default.
input_device = ""
# Capture sample rate in Hz.
sample_rate = 44100
# Resample to this rate before upload (Whisper runs at 16 kHz → smaller upload,
# lower latency, no quality loss). 0 disables resampling.
upload_sample_rate = 16000
# Ignore clips shorter than this many seconds (filters key-click noise). 0 = off.
min_audio_sec = 0.5
# Phrases discarded as silence-hallucinations (lowercased, trailing .!? stripped).
# Overrides the built-in EN/DE/FR defaults entirely if set.
# hallucinations = ["merci", "sous-titres", "thank you"]

[postprocess]
# Optional LLM cleanup of dictation BEFORE it's typed (uses the Groq chat model,
# so it needs GROQ_API_KEY). Toggle quickly from the tray, fine-tune here.
#   "none"        — off (no extra latency; default)
#   "correct"     — fix spelling/grammar/punctuation, same language
#   "reformulate" — rewrite clearer/more fluent, same language
#   "translate"   — translate into target_language
mode = "none"
# Target language for "translate" (ISO-639-1 code or a language name).
target_language = "en"

[models]
# Groq chat / vision / TTS model ids.
chat = "llama-3.3-70b-versatile"
vision = "meta-llama/llama-4-scout-17b-16e-instruct"
tts = "canopylabs/orpheus-v1-english"

[clipboard]
# Delays (seconds) around the paste-and-restore dance. Lower = snappier, but too
# low can race the target app / clipboard manager.
paste_delay = 0.05
restore_delay = 0.03
# Cache window for focused-window/terminal detection (avoids repeated `niri msg`).
terminal_cache_ttl = 0.2

[hotkeys]
# evdev key names without the KEY_ prefix (case-insensitive). The first entry is
# the primary key, the rest are aliases. List available names with:
#   python -c "from evdev import ecodes; print([k for k in dir(ecodes) if k.startswith('KEY_')])"
dictation  = ["RIGHTALT", "F3", "F13"]
ai         = ["F4", "F14"]
ai_rewrite = ["F7"]
vision     = ["F8"]
pin        = ["F9"]
tts        = ["F10"]

[overlay]
# Recording overlay size in pixels.
width = 220
height = 60
